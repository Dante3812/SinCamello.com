<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SinCamello.com</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #1abc9c;
      --primary-dark: #16a085;
      --bg-light: #f3f4f6;
      --bg-white: #ffffff;
      --chat-bot: #ffffff;
      --chat-user: #1abc9c;
    }

    body { 
      background: #d1d5db; 
      margin: 0; 
      height: 100dvh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-family: 'Segoe UI', system-ui, sans-serif; 
    }
    
    .app-container { 
      background: var(--bg-white); 
      width: 100%; 
      max-width: 480px; 
      height: 100dvh; 
      display: flex; 
      flex-direction: column; 
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    @media (min-width: 481px) {
      .app-container { height: 90dvh; border-radius: 1.5rem; }
    }

    /* Pantallas */
    .screen {
      display: none; 
      flex-direction: column;
      height: 100%;
      width: 100%;
      animation: fadeIn 0.4s ease-out;
    }

     #loginSection {
      justify-content: flex-start !important; 
      padding-top: 15%; 
    }

    #loginSection h2 {
      font-size: 2.8rem !important; /* Título más grande */
      margin-bottom: 1.2rem !important; /* Espacio hacia los emojis */
    }

      .custom-subtitle {
        font-size: 1rem; 
        margin-bottom: 3rem; /* Ajusta este espacio según necesites */
        text-align: center;
        color: #6b7280; /* Un gris suave que queda muy profesional */
        font-weight: 500;
    }

    #statusMessage {
      margin-top: 15px;
      font-style: italic;
      color: #666;
      min-height: 24px;
      transition: opacity 0.5s ease;
      text-align: center;
    }

    .screen-centered { justify-content: center; padding: 2rem; overflow-y: auto; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* UI General */
    .btn-main { background: var(--primary); border: none; padding: 0.9rem; color: white; font-weight: 600; border-radius: 0.8rem; transition: 0.2s; width: 100%; }
    .btn-main:hover { background: var(--primary-dark); transform: translateY(-1px); color: white; }
    .form-control { border-radius: 0.8rem; padding: 0.8rem; border: 1px solid #ddd; background: #f9fafb; margin-bottom: 1rem; }
    .loader { display: none; text-align: center; margin-top: 1rem; }
    
    /* Chat UI */
    .chat-header {
      padding: 1rem;
      text-align: center;
      font-weight: bold;
      border-bottom: 1px solid #eee;
      background: white;
      z-index: 5;
    }

    .chat-window { 
      flex-grow: 1; 
      overflow-y: auto; 
      background: #f0f2f5; 
      padding: 1rem; 
      display: flex; 
      flex-direction: column; 
      gap: 0.8rem;
    }
    
    .bubble { 
      padding: 0.8rem 1rem; 
      border-radius: 1.2rem; 
      max-width: 85%; 
      font-size: 0.95rem; 
      line-height: 1.4;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .bubble-bot { background: var(--chat-bot); align-self: flex-start; border-bottom-left-radius: 0.2rem; color: #333; }
    .bubble-user { background: var(--chat-user); color: white; align-self: flex-end; border-bottom-right-radius: 0.2rem; }
    
    /* Input Area */
    .input-wrapper { 
      background: white; 
      padding: 0.8rem; 
      display: flex; 
      gap: 0.5rem; 
      align-items: flex-end;
      border-top: 1px solid #eee;
    }
    
    .input-wrapper textarea { 
      flex-grow: 1; 
      border: none;
      background: #f3f4f6;
      border-radius: 1.2rem;
      padding: 0.6rem 1rem;
      max-height: 100px;
      resize: none;
      outline: none;
    }

    .btn-circle { 
      width: 45px; height: 45px; border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
      transition: 0.2s;
      flex-shrink: 0;
    }
    .btn-send { background: var(--primary); color: white; }
    .btn-send:disabled { background: #ccc; }
    .btn-mic { background: #fee2e2; color: #ef4444; }
    .btn-mic.active { background: #ef4444; color: white; animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- LOGIN -->
    <div id="loginSection" class="screen screen-centered" style="display: flex;">
      <h2 class="fw-bold text-center mb-1" style="color: var(--primary);">SinCamello.com</h2>
      <div class="text-center custom-subtitle">Asistencia IA para búsqueda de empleo</div>
      <p class="text-center text-muted mb-4 small">Acceso previo versión Beta</p>
      <input type="text" id="userId" class="form-control text-center fw-bold fs-4" placeholder="Código de acceso" maxlength="5">
      <button onclick="handleLogin()" id="btnLogin" class="btn btn-main">Entrar</button>
      <div id="loginLoader" class="loader"><div class="spinner-border text-success spinner-border-sm"></div></div>
      <div id="statusMessage"></div>
    </div>

    <!-- DATOS BÁSICOS -->
    <div id="basicDataSection" class="screen screen-centered">
      <h3 class="fw-bold text-center mb-4">Información Básica</h3>
      <input type="text" id="nombres" class="form-control" placeholder="Nombres">
      <input type="text" id="apellidos" class="form-control" placeholder="Apellidos">
      <input type="tel" id="telefono" class="form-control" placeholder="Teléfono / WhatsApp">
      <input type="email" id="email" class="form-control" placeholder="Correo">
      <input type="text" id="ciudad" class="form-control" placeholder="Ciudad / Municipio">
      <button onclick="handleSaveData()" id="btnSave" class="btn btn-main">Comenzar</button>
      <div id="saveLoader" class="loader"><div class="spinner-border text-success spinner-border-sm"></div></div>
    </div>

    <!-- CHAT (MÓDULO IA) -->
    <div id="academicSection" class="screen">
      <div class="chat-header">🤖 SinCamello IA</div>
      <div id="chatWindow" class="chat-window">
        <div class="bubble bubble-bot">
          Hola, ¿Cómo estás?, me presento, soy Jimmy y estoy listo para que armemos tu perfil profesional.
        </div>
      </div>
      <div class="input-wrapper">
        <textarea id="transcriptPreview" rows="1" placeholder="Habla o escribe..." oninput="autoResize(this); checkInput()"></textarea>
        <button id="btnMic" onclick="toggleMic()" class="btn-circle btn-mic" title="Usar voz">🎙️</button>
        <button id="btnSend" onclick="sendToIA()" class="btn-circle btn-send" disabled title="Enviar">➤</button>
      </div>
    </div>

  </div>

  <script>
    /**
     * IMPORTANTE: Mantén actualizada esta URL con la última versión de tu Apps Script implementada
     */
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwA__DuWXNI6oZEKDblR0b5qfQSED4xWqTw_F5UpivWBELwUQQ9w8HQdJB2fVPheome/exec";
    let currentId = "";
    let userName = "";
    let lastUserMessage = "";

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
      const target = document.getElementById(id);
      if(target) {
        target.style.display = 'flex';
        if(id === 'academicSection') scrollChat();
      }
    }

    async function call(payload) {
      try {
        const resp = await fetch(WEB_APP_URL, { 
          method: 'POST', 
          body: JSON.stringify(payload) 
        });
        return await resp.json();
      } catch (e) {
        console.error("Error en call:", e);
        return { success: false, error: "Error de conexión con el servidor." };
      }
    }

    const mensajesCarga = [
      "Estamos creando tu entorno de trabajo...",
      "Esto puede tardar unos instantes...",
      "Despertando a Jimmy para que te ayude...",
      "Organizando los archivadores en la nube...",
      "Casi listo, estamos preparando tu oficina virtual..."
    ];

    let mensajeInterval;

    function rotarMensajes() {
      const cajaMensaje = document.getElementById('statusMessage');
      let i = 0;
  
      // Ponemos el primero de inmediato
      cajaMensaje.innerText = mensajesCarga[0];
  
      // Cambiamos cada 3 segundos
      mensajeInterval = setInterval(() => {
        i = (i + 1) % mensajesCarga.length;
        cajaMensaje.style.opacity = 0; // Efecto de desvanecimiento
    
      setTimeout(() => {
        cajaMensaje.innerText = mensajesCarga[i];
        cajaMensaje.style.opacity = 1;
        }, 500);
    
      }, 5000);
    }


    async function handleLogin() {
      const val = document.getElementById('userId').value.trim().toUpperCase();
      if(val.length < 5) return;
      
      const loader = document.getElementById('loginLoader');
      const btn = document.getElementById('btnLogin');
      
      loader.style.display = 'block';
      rotarMensajes(); // Inicia la rotación de frases
      btn.disabled = true;

      const res = await call({ action: "setup", userId: val });
      
      if(res.success) {
        clearInterval(mensajeInterval); // Detiene la rotación
        currentId = val;
        showScreen(res.step);
      } else {
        alert(res.error || "Error al ingresar.");
        loader.style.display = 'none';
        btn.disabled = false;
      }
    }

    async function handleSaveData() {
      userName = document.getElementById('nombres').value.trim();
      const data = {
        nombres: userName,
        apellidos: document.getElementById('apellidos').value,
        telefono: document.getElementById('telefono').value,
        email: document.getElementById('email').value,
        ciudad: document.getElementById('ciudad').value
      };

      if(!data.nombres || !data.email) {
        alert("Por favor completa al menos nombre y correo.");
        return;
      }

      document.getElementById('saveLoader').style.display = 'block';
      const res = await call({ action: "saveBasic", userId: currentId, data });
      
      if(res.success) {
        const chatWindow = document.getElementById('chatWindow')
        chatWindow.innerHTML = `
          <div class="bubble bubble-bot">
            ¡Hola ${userName}! Qué gusto saludarte. Soy Jimmy, tu asistente IA y estoy listo para que armemos ese perfil profesional.
          </div>
          `;
        showScreen('academicSection');
        
      } else {
        alert("Hubo un problema al guardar tus datos.");
        document.getElementById('saveLoader').style.display = 'none';
      }
    }

    // --- LÓGICA DE CHAT & IA ---
    
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = (el.scrollHeight) + 'px';
    }

    function checkInput() {
      const text = document.getElementById('transcriptPreview').value.trim();
      document.getElementById('btnSend').disabled = text.length < 3;
    }

    function scrollChat() {
      const w = document.getElementById('chatWindow');
      w.scrollTop = w.scrollHeight;
    }

    async function sendToIA() {
      const input = document.getElementById('transcriptPreview');
      const text = input.value.trim();
      lastUserMessage = text
      if(!text) return;

      const chat = document.getElementById('chatWindow');
      const btn = document.getElementById('btnSend');

      // 1. Mostrar mensaje usuario
      chat.innerHTML += `<div class="bubble bubble-user">${text}</div>`;
      input.value = ""; 
      autoResize(input); 
      checkInput(); 
      scrollChat();

      // 2. Estado "Pensando"
      btn.innerHTML = "⏳"; 
      btn.disabled = true;
      const tempId = "t-" + Date.now();
      chat.innerHTML += `<div id="${tempId}" class="bubble bubble-bot"><em>...</em></div>`;
      scrollChat();

      // 3. Llamar Backend
      const res = await call({ action: "saveAcademic", userId: currentId, rawText: text });
      
      const tempElement = document.getElementById(tempId);
      if(tempElement) tempElement.remove();

      // 4. Mostrar respuesta IA (viniendo de Gemini 2.5)
      const msg = res.success ? res.msg : "HUbo un fallo en el servidor";
      chat.innerHTML += `<div class="bubble bubble-bot">${msg}</div>`;
      
      btn.innerHTML = "➤"; 
      scrollChat();
    }

    // --- RECONOCIMIENTO DE VOZ ---
    let recognition;
    let active = false;

    if ('webkitSpeechRecognition' in window || 'speechRecognition' in window) {
      const SpeechRecognition = window.webkitSpeechRecognition || window.speechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'es-CO';
      recognition.continuous = true;
      recognition.interimResults = false;

      recognition.onresult = (e) => {
        const t = e.results[e.results.length - 1][0].transcript;
        const input = document.getElementById('transcriptPreview');
        input.value += (input.value ? " " : "") + t;
        autoResize(input); 
        checkInput();
      };

      recognition.onend = () => {
        active = false;
        document.getElementById('btnMic').classList.remove('active');
      };

      recognition.onerror = (e) => {
        console.error("Error Speech:", e.error);
        stopMic();
      };
    }

    function toggleMic() {
      if(!recognition) return alert("Tu navegador no soporta reconocimiento de voz.");
      const btn = document.getElementById('btnMic');
      if(!active) {
        try {
          recognition.start(); 
          active = true; 
          btn.classList.add('active');
        } catch(e) { console.error(e); }
      } else {
        stopMic();
      }
    }

    function stopMic() {
      if(recognition && active) {
        recognition.stop();
        active = false;
        document.getElementById('btnMic').classList.remove('active');
      }
    }
  </script>
</body>
</html>
