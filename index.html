<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SinCamello.com</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
    .card-custom { border-radius: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: none; }
    .btn-custom { background-color: #2c3e50; color: white; font-weight: 600; border-radius: 0.5rem; padding: 12px; }
    .btn-custom:hover { background-color: #1a252f; color: white; }
    .btn-success-custom { background-color: #27ae60; color: white; font-weight: bold; padding: 12px; border-radius: 0.5rem; }
    #loader, #paso-2, #paso-3 { display: none; }
    .analisis-caja { background: #eafaf1; padding: 15px; border-radius: 8px; border-left: 4px solid #27ae60; font-size: 0.95rem; white-space: pre-wrap; color: #333;}
    .chulito { font-size: 5rem; color: #27ae60; line-height: 1; margin-bottom: 10px; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

  <div class="container" style="max-width: 600px;">
    <div class="card card-custom p-4">
      <h2 class="text-center fw-bold mb-1">SinCamello.com</h2>
      
      <div id="paso-1">
        <p class="text-center text-muted mb-4">Radar y Fábrica de CVs</p>
        <div class="mb-4">
          <label class="form-label fw-bold">Enlace de la Vacante</label>
          <input type="url" id="linkOferta" class="form-control" placeholder="https://co.computrabajo.com/...">
        </div>
        <button id="btnAnalizar" onclick="analizarOferta()" class="btn btn-custom w-100">🔍 Analizar Oferta</button>
      </div>

      <div id="loader" class="text-center mt-4">
        <div class="spinner-border text-primary" role="status"></div>
        <p id="loader-text" class="mt-2 text-muted fw-bold">Trabajando...</p>
      </div>

      <div id="paso-2" class="mt-2">
        <h5 class="fw-bold text-primary mb-3">Diagnóstico de la Oferta</h5>
        <div id="texto-analisis" class="analisis-caja mb-4">Aquí saldrá el análisis...</div>
        <div class="d-flex gap-2">
          <button onclick="reiniciarApp()" class="btn btn-outline-danger w-50 fw-bold">Descartar</button>
          <button id="btnGenerar" onclick="mandarAImprimir()" class="btn btn-success-custom w-50">⚡ Generar CV</button>
        </div>
      </div>

      <div id="paso-3" class="text-center mt-3">
        <div class="chulito">✅</div>
        <h4 class="fw-bold text-success">¡Hoja de Vida Creada!</h4>
        <p class="text-muted mt-2">Ya generamos tu hoja de vida. Ve y revisa tu carpeta de destino en Google Drive para ver el editable.</p>
        <button onclick="reiniciarApp()" class="btn btn-outline-secondary mt-3 px-4">Analizar otra oferta</button>
      </div>

    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycby4TW4FRbM9nmDjpJWrje2TZvZ-dkd6OsPu6yCOQ18XeHk7KDq4DL5p0jPUM8LPWWv5eA/exec"; // <-- ACUÉRDATE DE PONER TU LINK AQUÍ
    let ofertaCruda = ""; // Guardamos la oferta en memoria para el paso 2

    async function analizarOferta() {
      const link = document.getElementById('linkOferta').value.trim();
      if (!link) return alert("Pega un enlace por favor.");

      cambiarEstado('loader', 'Extrayendo datos y comparando con tu perfil...');
      
      try {
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'analizar', url: link }),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        });
        const data = await response.json();

        if (data.estado === "exito") {
          ofertaCruda = data.textoOferta; // Guardamos lo que leyó el scraper
          document.getElementById('texto-analisis').innerText = data.analisis;
          cambiarEstado('paso-2');
        } else {
          alert("Error: " + data.mensaje);
          cambiarEstado('paso-1');
        }
      } catch (error) {
        alert("Error de conexión.");
        cambiarEstado('paso-1');
      }
    }

    async function mandarAImprimir() {
      cambiarEstado('loader', 'Gemini está redactando y armando el Doc...');
      
      try {
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'generar', oferta: ofertaCruda }),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        });
        const data = await response.json();

        if (data.estado === "exito") {
          cambiarEstado('paso-3');
        } else {
          alert("Error generando CV: " + data.mensaje);
          cambiarEstado('paso-2');
        }
      } catch (error) {
        alert("Fallo de conexión en la imprenta.");
        cambiarEstado('paso-2');
      }
    }

    function cambiarEstado(estado, mensajeLoader = "") {
      document.getElementById('paso-1').style.display = 'none';
      document.getElementById('paso-2').style.display = 'none';
      document.getElementById('paso-3').style.display = 'none';
      document.getElementById('loader').style.display = 'none';
      
      document.getElementById(estado).style.display = 'block';
      if(estado === 'loader') document.getElementById('loader-text').innerText = mensajeLoader;
    }

    function reiniciarApp() {
      document.getElementById('linkOferta').value = '';
      ofertaCruda = '';
      cambiarEstado('paso-1');
    }
  </script>
</body>
</html>
