<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; padding: 20px; }
    .card-custom { background: white; padding: 2.5rem; border-radius: 1.5rem; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
    .btn-main { background: #1abc9c; border: none; padding: 0.8rem; color: white; font-weight: 600; transition: 0.3s; }
    .btn-main:hover { background: #16a085; transform: translateY(-2px); }
    .form-control { border-radius: 0.8rem; padding: 0.7rem; margin-bottom: 1rem; }
    .loader { display: none; margin-top: 1rem; }
    
    /* ESTÉTICA DE CHAT PROFESIONAL */
    .chat-container { height: 280px; overflow-y: auto; border-radius: 1rem; background: #f8f9fa; padding: 15px; border: 1px solid #dee2e6; display: flex; flex-direction: column; }
    .bubble { padding: 10px 15px; border-radius: 1.2rem; margin-bottom: 10px; max-width: 85%; font-size: 0.9rem; line-height: 1.4; }
    .bubble-bot { background: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 0.2rem; }
    .bubble-user { background: #1abc9c; color: white; align-self: flex-end; border-bottom-right-radius: 0.2rem; margin-left: auto; }
  </style>
</head>
<body>

  <div id="loginSection" class="card-custom text-center">
    <h2 class="fw-bold">SinCamello.com</h2>
    <p class="text-muted">Ingresa tu código Beta</p>
    <input type="text" id="userId" class="form-control text-center fw-bold" placeholder="EJ: XJ72K" maxlength="5">
    <button onclick="handleLogin()" id="btnLogin" class="btn btn-main w-100">Entrar al Sistema</button>
    <div id="loginLoader" class="loader"><div class="spinner-border text-success"></div></div>
  </div>

  <div id="basicDataSection" class="card-custom" style="display: none;">
    <h2 class="text-center fw-bold">¡Bienvenido!</h2>
    <p class="text-center text-muted small mb-4">Completa tu perfil básico</p>
    <input type="text" id="nombres" class="form-control" placeholder="Nombres">
    <input type="text" id="apellidos" class="form-control" placeholder="Apellidos">
    <input type="tel" id="telefono" class="form-control" placeholder="Teléfono / WhatsApp">
    <input type="email" id="email" class="form-control" placeholder="Correo electrónico">
    <input type="text" id="ciudad" class="form-control" placeholder="Ciudad">
    <button onclick="handleSaveData()" id="btnSave" class="btn btn-main w-100">Guardar y Continuar</button>
    <div id="saveLoader" class="loader text-center"><div class="spinner-border text-success"></div></div>
  </div>

  <div id="academicSection" class="card-custom" style="display: none;">
    <h3 class="text-center fw-bold mb-3">Asistente de Perfil</h3>
    
    <div id="chatWindow" class="chat-container mb-3">
      <div class="bubble bubble-bot">
        <strong>SinCamello:</strong> ¡Excelente! Ahora cuéntame sobre tus estudios. ¿Qué estudiaste, dónde y en qué fechas?
      </div>
    </div>

    <div class="mb-3">
      <label class="small text-muted mb-1">Tu respuesta (puedes editarla):</label>
      <textarea id="transcriptPreview" class="form-control" rows="3" placeholder="Presiona el micro y habla..."></textarea>
    </div>

    <div class="d-flex gap-2 mb-2">
      <button id="btnMic" onclick="toggleMic()" class="btn btn-outline-danger w-100 fw-bold">🎙️ Hablar</button>
    </div>
    <button id="btnSendAcademic" onclick="handleAcademicData()" class="btn btn-main w-100" disabled>Enviar a la IA</button>
  </div>

  <script>
    // URL DE TU APP (Sigue siendo la misma)
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxo5fuunAcNokTVEMbHFbipZfpsFllwOlom79NIARDZX2gmWX4v11vy9ys3UJLgQ31E/exec";
    let currentUserId = "";

    async function callBackend(payload) {
      try {
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        return await response.json();
      } catch (error) {
        console.error("Error:", error);
        return { success: false, error: "Fallo de conexión." };
      }
    }

    async function handleLogin() {
      const userId = document.getElementById('userId').value.trim().toUpperCase();
      if (userId.length < 5) return alert("Código incompleto.");
      toggleLoader('login', true);
      const res = await callBackend({ action: "setup", userId: userId });
      if (res && res.success) {
        currentUserId = userId;
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById(res.step).style.display = 'block';
      } else {
        alert(res ? res.error : "Error.");
        toggleLoader('login', false);
      }
    }

    async function handleSaveData() {
      const data = {
        nombres: document.getElementById('nombres').value,
        apellidos: document.getElementById('apellidos').value,
        telefono: document.getElementById('telefono').value,
        email: document.getElementById('email').value,
        ciudad: document.getElementById('ciudad').value
      };
      toggleLoader('save', true);
      const res = await callBackend({ action: "saveBasic", userId: currentUserId, data: data });
      if (res && res.success) {
        document.getElementById('basicDataSection').style.display = 'none';
        document.getElementById('academicSection').style.display = 'block';
      } else {
        alert(res ? res.error : "Error.");
        toggleLoader('save', false);
      }
    }

    function toggleLoader(type, show) {
      document.getElementById(type + 'Loader').style.display = show ? 'block' : 'none';
      document.getElementById(type === 'login' ? 'btnLogin' : 'btnSave').disabled = show;
    }

        // --- LÓGICA DE VOZ (CON FILTRO ANTI-ECO) ---
    let recognition;
    let isListening = false;
    let textoGuardado = ""; // Memoria para lo que ya se confirmó

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'es-CO';
      recognition.continuous = true;
      recognition.interimResults = true; // Muestra el texto mientras hablas

      // Cuando el micro arranca, guardamos lo que ya estaba en el cuadro de texto
      recognition.onstart = () => {
        textoGuardado = document.getElementById('transcriptPreview').value;
        if (textoGuardado.length > 0 && !textoGuardado.endsWith(" ")) {
          textoGuardado += " ";
        }
      };

      recognition.onresult = (event) => {
        let textoIntermedio = "";
        let nuevoTextoFinal = "";

        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            nuevoTextoFinal += event.results[i][0].transcript + " ";
          } else {
            textoIntermedio += event.results[i][0].transcript;
          }
        }

        // Si ya confirmó una frase, la guardamos en la memoria dura
        if (nuevoTextoFinal) {
          textoGuardado += nuevoTextoFinal;
        }

        // Mostramos la memoria dura + lo que está adivinando en este momento
        document.getElementById('transcriptPreview').value = textoGuardado + textoIntermedio;
        
        // Habilitar el botón de enviar
        document.getElementById('btnSendAcademic').disabled = document.getElementById('transcriptPreview').value.trim().length < 5;
      };

      recognition.onerror = (event) => {
        console.error("Error de reconocimiento: ", event.error);
      };
    }

    async function toggleMic() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(t => t.stop());
      } catch (e) { return alert("Permite el acceso al micrófono en el candadito (🔒)."); }
      
      const btn = document.getElementById('btnMic');
      if (!isListening) {
        recognition.start();
        isListening = true;
        btn.innerHTML = "🛑 Detener";
        btn.classList.replace('btn-outline-danger', 'btn-danger');
      } else {
        recognition.stop();
        isListening = false;
        btn.innerHTML = "🎙️ Hablar";
        btn.classList.replace('btn-danger', 'btn-outline-danger');
      }
    }

    async function handleAcademicData() {
      const texto = document.getElementById('transcriptPreview').value.trim();
      const btn = document.getElementById('btnSendAcademic');
      btn.disabled = true;
      btn.innerHTML = 'Enviando...';
      
      const res = await callBackend({ action: "saveAcademic", userId: currentUserId, rawText: texto });
      
      if (res && res.success) {
        const chat = document.getElementById('chatWindow');
        chat.innerHTML += `<div class="bubble bubble-user">${texto}</div>`;
        chat.innerHTML += `<div class="bubble bubble-bot"><strong>SinCamello:</strong> ¡Entendido! Ya guardé eso. ¿Pasamos a tu experiencia laboral?</div>`;
        chat.scrollTop = chat.scrollHeight;
        
        document.getElementById('transcriptPreview').value = "";
        textoGuardado = ""; // Limpiamos la memoria para la siguiente nota
        btn.innerHTML = "Enviar a la IA";
        btn.disabled = false;
      } else {
        alert("Fallo al guardar.");
        btn.innerHTML = "Enviar a la IA";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
