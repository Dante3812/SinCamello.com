<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; padding: 15px; }
    /* Hice la tarjeta un poco más alta para que el chat tenga más espacio */
    .card-custom { background: white; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; min-height: 85vh; display: flex; flex-direction: column; }
    .btn-main { background: #1abc9c; border: none; padding: 0.8rem; color: white; font-weight: 600; transition: 0.3s; }
    .btn-main:hover { background: #16a085; transform: translateY(-2px); }
    .form-control { border-radius: 0.8rem; padding: 0.7rem; margin-bottom: 1rem; }
    .loader { display: none; margin-top: 1rem; }
    
    /* ESTÉTICA DE CHAT PROFESIONAL (Ampliado) */
    .chat-container { flex-grow: 1; height: 400px; overflow-y: auto; border-radius: 1rem; background: #f8f9fa; padding: 15px; border: 1px solid #dee2e6; display: flex; flex-direction: column; }
    .bubble { padding: 10px 15px; border-radius: 1.2rem; margin-bottom: 10px; max-width: 85%; font-size: 0.9rem; line-height: 1.4; }
    .bubble-bot { background: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 0.2rem; }
    .bubble-user { background: #1abc9c; color: white; align-self: flex-end; border-bottom-right-radius: 0.2rem; margin-left: auto; }
    
    /* NUEVOS ESTILOS PARA LOS BOTONES CUADRADOS */
    .btn-square { width: 55px; border-radius: 0.8rem; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; padding: 0; transition: all 0.2s; }
  </style>
</head>
<body>

  <div id="loginSection" class="card-custom text-center justify-content-center" style="min-height: auto;">
    <h2 class="fw-bold">SinCamello.com</h2>
    <p class="text-muted">Ingresa tu código Beta</p>
    <input type="text" id="userId" class="form-control text-center fw-bold" placeholder="EJ: XJ72K" maxlength="5">
    <button onclick="handleLogin()" id="btnLogin" class="btn btn-main w-100">Entrar al Sistema</button>
    <div id="loginLoader" class="loader"><div class="spinner-border text-success"></div></div>
  </div>

  <div id="basicDataSection" class="card-custom" style="display: none; min-height: auto;">
    <h2 class="text-center fw-bold">¡Bienvenido!</h2>
    <p class="text-center text-muted small mb-4">Completa tu perfil básico</p>
    <input type="text" id="nombres" class="form-control" placeholder="Nombres">
    <input type="text" id="apellidos" class="form-control" placeholder="Apellidos">
    <input type="tel" id="telefono" class="form-control" placeholder="Teléfono / WhatsApp">
    <input type="email" id="email" class="form-control" placeholder="Correo electrónico">
    <input type="text" id="ciudad" class="form-control" placeholder="Ciudad">
    <button onclick="handleSaveData()" id="btnSave" class="btn btn-main w-100">Guardar y Continuar</button>
    <div id="saveLoader" class="loader text-center"><div class="spinner-border text-success"></div></div>
  </div>

  <div id="academicSection" class="card-custom" style="display: none;">
    <h3 class="text-center fw-bold mb-3">SinCamello IA</h3>
    
    <div id="chatWindow" class="chat-container mb-3">
      <div class="bubble bubble-bot">
        <strong>SinCamello:</strong> ¡Excelente! Ahora cuéntame sobre tus estudios. ¿Qué estudiaste, dónde y en qué fechas?
      </div>
    </div>

    <div class="d-flex gap-2">
      <textarea id="transcriptPreview" class="form-control mb-0" style="resize: none;" rows="3" placeholder="Presiona el micro y habla..." oninput="checkTextLength()"></textarea>
      
      <div class="d-flex flex-column gap-2">
        <button id="btnMic" onclick="toggleMic()" class="btn btn-outline-danger btn-square flex-grow-1" title="Hablar / Pausar">🎙️</button>
        <button id="btnSendAcademic" onclick="handleAcademicData()" class="btn btn-main btn-square flex-grow-1" title="Enviar a la IA" disabled>➤</button>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxo5fuunAcNokTVEMbHFbipZfpsFllwOlom79NIARDZX2gmWX4v11vy9ys3UJLgQ31E/exec";
    let currentUserId = "";

    async function callBackend(payload) {
      try {
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        return await response.json();
      } catch (error) {
        console.error("Error:", error);
        return { success: false, error: "Fallo de conexión." };
      }
    }

    async function handleLogin() {
      const userId = document.getElementById('userId').value.trim().toUpperCase();
      if (userId.length < 5) return alert("Código incompleto.");
      toggleLoader('login', true);
      const res = await callBackend({ action: "setup", userId: userId });
      if (res && res.success) {
        currentUserId = userId;
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById(res.step).style.display = 'block';
      } else {
        alert(res ? res.error : "Error.");
        toggleLoader('login', false);
      }
    }

    async function handleSaveData() {
      const data = {
        nombres: document.getElementById('nombres').value,
        apellidos: document.getElementById('apellidos').value,
        telefono: document.getElementById('telefono').value,
        email: document.getElementById('email').value,
        ciudad: document.getElementById('ciudad').value
      };
      toggleLoader('save', true);
      const res = await callBackend({ action: "saveBasic", userId: currentUserId, data: data });
      if (res && res.success) {
        document.getElementById('basicDataSection').style.display = 'none';
        document.getElementById('academicSection').style.display = 'block';
      } else {
        alert(res ? res.error : "Error.");
        toggleLoader('save', false);
      }
    }

    function toggleLoader(type, show) {
      document.getElementById(type + 'Loader').style.display = show ? 'block' : 'none';
      document.getElementById(type === 'login' ? 'btnLogin' : 'btnSave').disabled = show;
    }
    
    // ==========================================
    // LÓGICA DE VOZ - MODO WALKIE-TALKIE (ESTABLE)
    // ==========================================
    let recognition;
    let isListening = false;

    function checkTextLength() {
      const text = document.getElementById('transcriptPreview').value.trim();
      document.getElementById('btnSendAcademic').disabled = text.length < 5;
    }

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'es-CO';
      recognition.continuous = true; 
      recognition.interimResults = false; 

      recognition.onstart = () => {
        document.getElementById('transcriptPreview').placeholder = "🎤 Escuchando... (Añadiendo a tu respuesta)";
      };

      recognition.onresult = (event) => {
        let transcript = "";
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            transcript += event.results[i][0].transcript + " ";
          }
        }
        
        if (transcript.length > 0) {
            const preview = document.getElementById('transcriptPreview');
            if (preview.value.length > 0 && !preview.value.endsWith(" ")) {
                preview.value += " ";
            }
            preview.value += transcript;
            checkTextLength();
        }
      };

      recognition.onend = () => {
        isListening = false;
        const btn = document.getElementById('btnMic');
        // Solo cambiamos el ícono en lugar de meter texto largo para que se mantenga cuadrado
        btn.innerHTML = "🎙️"; 
        btn.classList.replace('btn-danger', 'btn-outline-danger');
        document.getElementById('transcriptPreview').placeholder = "Puedes editar el texto o seguir hablando...";
        checkTextLength();
      };

      recognition.onerror = (event) => {
        console.error("Error de voz: ", event.error);
        isListening = false;
      };
    }

    async function toggleMic() {
      const btn = document.getElementById('btnMic');

      if (!isListening) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          stream.getTracks().forEach(t => t.stop());
          
          recognition.start();
          isListening = true;
          // Solo el ícono de Stop para el botón cuadrado
          btn.innerHTML = "🛑";
          btn.classList.replace('btn-outline-danger', 'btn-danger');
        } catch (e) { alert("Permite el acceso al micrófono."); }
      } else {
        recognition.stop();
      }
    }

    // ==========================================
    // ENVÍO DE DATOS
    // ==========================================
    async function handleAcademicData() {
      const texto = document.getElementById('transcriptPreview').value.trim();
      const btn = document.getElementById('btnSendAcademic');
      
      btn.disabled = true;
      // Usamos un ícono de reloj de arena para no desarmar el botón cuadrado
      btn.innerHTML = '⏳';

      const res = await callBackend({ action: "saveAcademic", userId: currentUserId, rawText: texto });

      if (res && res.success) {
        const chat = document.getElementById('chatWindow');
        chat.innerHTML += `<div class="bubble bubble-user">${texto}</div>`;
        chat.innerHTML += `<div class="bubble bubble-bot"><strong>SinCamello:</strong> ¡Perfecto! Ya lo guardé. ¿Hay algo más que quieras añadir?</div>`;
        chat.scrollTop = chat.scrollHeight;
        
        document.getElementById('transcriptPreview').value = "";
        btn.innerHTML = "➤"; // Vuelve a la flechita
        checkTextLength(); 
      } else {
        alert("Fallo al guardar en la base de datos.");
        btn.innerHTML = "➤";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
