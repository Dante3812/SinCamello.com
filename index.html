<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; padding: 20px; }
    .card-custom { background: white; padding: 2.5rem; border-radius: 1.5rem; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
    .btn-main { background: #1abc9c; border: none; padding: 0.8rem; color: white; font-weight: 600; transition: 0.3s; }
    .btn-main:hover { background: #16a085; transform: translateY(-2px); }
    .form-control { border-radius: 0.8rem; padding: 0.7rem; margin-bottom: 1rem; }
    .loader { display: none; margin-top: 1rem; }
  </style>
</head>
<body>

  <div id="loginSection" class="card-custom text-center">
    <h2>SinCamello.com</h2>
    <p class="text-muted">Ingresa tu código Beta</p>
    <input type="text" id="userId" class="form-control text-center fw-bold" placeholder="EJ: XJ72K" maxlength="5">
    <button onclick="handleLogin()" id="btnLogin" class="btn btn-main w-100">Entrar al Sistema</button>
    <div id="loginLoader" class="loader"><div class="spinner-border text-success"></div></div>
  </div>

  <div id="basicDataSection" class="card-custom" style="display: none;">
    <h2 class="text-center">¡Bienvenido!</h2>
    <input type="text" id="nombres" class="form-control" placeholder="Nombres">
    <input type="text" id="apellidos" class="form-control" placeholder="Apellidos">
    <input type="tel" id="telefono" class="form-control" placeholder="Teléfono / WhatsApp">
    <input type="email" id="email" class="form-control" placeholder="Correo electrónico">
    <input type="text" id="ciudad" class="form-control" placeholder="Ciudad">
    <button onclick="handleSaveData()" id="btnSave" class="btn btn-main w-100">Guardar y Continuar</button>
    <div id="saveLoader" class="loader text-center"><div class="spinner-border text-success"></div></div>
  </div>

  <div id="academicSection" class="card-custom" style="display: none;">
  <h2 class="text-center">Asistente Virtual</h2>
  <div id="chatWindow" class="mb-3 p-3 border rounded-3 bg-light" style="height: 150px; overflow-y: auto; font-size: 0.9rem;">
    <p class="text-success"><strong>SinCamello:</strong> ¡Listo! Ahora cuéntame sobre tus estudios. ¿Qué estudiaste, dónde y cuándo? (Usa el micro para hablar).</p>
  </div>

  <textarea id="transcriptPreview" class="form-control mb-3" rows="4" placeholder="Aquí aparecerá lo que digas..."></textarea>

  <div class="d-flex gap-2">
    <button id="btnMic" onclick="toggleMic()" class="btn btn-outline-danger w-100 fw-bold">
      🎙️ Iniciar Micrófono
    </button>
  </div>
  <button id="btnSendAcademic" onclick="handleAcademicData()" class="btn btn-main w-100 mt-2" disabled>
    Enviar Información
  </button>
</div>

  <script>
    // ==========================================
    // PUENTE DE CONEXIÓN (NUEVO)
    // ==========================================
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbycP2vvH52axW_PeskwLy6utB5-yBZlhgvoCzuFgsemfNimdVnIdc4KE29d1nH5xA7u/exec";
    let currentUserId = "";

    // Función maestra que envía los paquetes de datos a Google
    async function callBackend(payload) {
      try {
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        return await response.json();
      } catch (error) {
        console.error("Error de conexión:", error);
        return { success: false, error: "Fallo al conectar con el servidor." };
      }
    }

    // ==========================================
    // LÓGICA DE INTERFAZ (Misma estructura, ahora con async/await)
    // ==========================================
    async function handleLogin() {
      const userId = document.getElementById('userId').value.trim().toUpperCase();
      if (userId.length < 5) return alert("Código incompleto.");
      toggleLoader('login', true);

      // Enviamos el paquete de "setup" al backend
      const res = await callBackend({ action: "setup", userId: userId });

      if (res && res.success) {
        currentUserId = userId;
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById(res.step).style.display = 'block';
      } else {
        alert(res ? res.error : "Error desconocido al acceder.");
        toggleLoader('login', false);
      }
    }

    async function handleSaveData() {
      const data = {
        nombres: document.getElementById('nombres').value,
        apellidos: document.getElementById('apellidos').value,
        telefono: document.getElementById('telefono').value,
        email: document.getElementById('email').value,
        ciudad: document.getElementById('ciudad').value
      };
      toggleLoader('save', true);

      // Enviamos el paquete de "saveBasic" al backend
      const res = await callBackend({ action: "saveBasic", userId: currentUserId, data: data });

      if (res && res.success) {
        document.getElementById('basicDataSection').style.display = 'none';
        document.getElementById('academicSection').style.display = 'block';
      } else {
        alert(res ? res.error : "Error desconocido al guardar.");
        toggleLoader('save', false);
      }
    }

    function toggleLoader(type, show) {
      document.getElementById(type + 'Loader').style.display = show ? 'block' : 'none';
      document.getElementById(type === 'login' ? 'btnLogin' : 'btnSave').disabled = show;
    }

    // ==========================================
    // LÓGICA DEL MICRÓFONO
    // ==========================================
    let recognition;
    let isListening = false;

    // 1. CONFIGURACIÓN DEL OÍDO
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'es-CO';
      recognition.continuous = true;
      recognition.interimResults = true;

      recognition.onresult = (event) => {
        let textoIntermedio = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            document.getElementById('transcriptPreview').value += event.results[i][0].transcript + " ";
          }
        }
        // Habilitar botón si hay texto suficiente
        const preview = document.getElementById('transcriptPreview').value;
        document.getElementById('btnSendAcademic').disabled = preview.trim().length < 10;
      };

      recognition.onerror = (event) => {
        console.error("Error de reconocimiento: ", event.error);
        if(event.error === 'not-allowed') {
          alert("¡Parcero! Tienes que darle permiso al micrófono en el candadito de arriba.");
        }
      };
    }

    async function toggleMic() {
      const btn = document.getElementById('btnMic');
      
      // Forzar petición de permiso a nivel de hardware
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(track => track.stop());
      } catch (err) {
        console.error("Error al pedir permiso:", err);
        alert("Para usar el asistente, debes permitir el acceso al micrófono en el candadito (🔒) de la barra de direcciones.");
        return;
      }

      // Iniciar/Detener reconocimiento
      if (!isListening) {
        try {
          recognition.start();
          isListening = true;
          btn.innerHTML = "🛑 Detener grabación";
          btn.classList.replace('btn-outline-danger', 'btn-danger');
          document.getElementById('chatWindow').innerHTML += `<p class="text-secondary small"><em>Escuchando...</em></p>`;
        } catch (e) { console.log("Reconocimiento ya activo."); }
      } else {
        recognition.stop();
        isListening = false;
        btn.innerHTML = "🎙️ Continuar Hablando";
        btn.classList.replace('btn-danger', 'btn-outline-danger');
      }
    }

    // 2. FUNCIÓN DE ENVÍO REAL AL SERVIDOR
    async function handleAcademicData() {
      const texto = document.getElementById('transcriptPreview').value.trim();
      if (texto.length < 10) return;

      const btn = document.getElementById('btnSendAcademic');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Procesando...';

      // Enviamos el paquete de "saveAcademic" al backend
      const res = await callBackend({ action: "saveAcademic", userId: currentUserId, rawText: texto });

      if (res && res.success) {
        const chat = document.getElementById('chatWindow');
        chat.innerHTML += `<p class="text-primary mt-2"><strong>Tú:</strong> ${texto}</p>`;
        chat.innerHTML += `<p class="text-success"><strong>SinCamello:</strong> ¡Recibido! He guardado tu información académica.</p>`;
        chat.scrollTop = chat.scrollHeight; 
        
        document.getElementById('transcriptPreview').value = "";
        btn.innerHTML = "Enviar Información";
      } else {
        alert("Error al enviar: " + (res ? res.error : "Error desconocido."));
        btn.disabled = false;
        btn.innerHTML = "Enviar Información";
      }
    }
  </script>
</body>
</html>
