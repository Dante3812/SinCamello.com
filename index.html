<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmpleApp | Máquina de CVs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
    .card-custom { border-radius: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: none; }
    .btn-custom { background-color: #2c3e50; color: white; font-weight: 600; border-radius: 0.5rem; padding: 12px; }
    .btn-custom:hover { background-color: #1a252f; color: white; }
    #loader { display: none; }
    #result-box { display: none; border-left: 4px solid #27ae60; background: #eafaf1; border-radius: 0.5rem; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

  <div class="container" style="max-width: 600px;">
    <div class="card card-custom p-4">
      <h2 class="text-center fw-bold mb-1">EmpleApp 🚀</h2>
      <p class="text-center text-muted mb-4">Generador Industrial de Hojas de Vida</p>

      <div class="mb-3">
        <label class="form-label fw-bold">Empresa / Vacante</label>
        <input type="text" id="empresa" class="form-control" placeholder="Ej: Analista de Datos - MercadoLibre">
      </div>

      <div class="mb-4">
        <label class="form-label fw-bold">Descripción de la Oferta</label>
        <textarea id="oferta" class="form-control" rows="5" placeholder="Pega aquí todo el texto de la oferta de trabajo..."></textarea>
      </div>

      <button id="btnGenerar" onclick="generarCV()" class="btn btn-custom w-100">Fabricar CV a la Medida</button>

      <div id="loader" class="text-center mt-4">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted fw-bold">Gemini está analizando la vacante y redactando...</p>
      </div>

      <div id="result-box" class="p-3 mt-4 text-center">
        <h5 class="fw-bold text-success mb-2">¡Hoja de Vida Lista!</h5>
        <a id="link-doc" href="#" target="_blank" class="btn btn-success fw-bold">📄 Abrir Documento Generado</a>
      </div>
    </div>
  </div>

  <script>
    // IMPORTANTE: Pon aquí la URL de tu Apps Script implementado
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxspHegtVg6Y5wIsV3P8w-0RVLwDo9MnDEtn4xMY8xWrvQO3yt1nXr9MdRaMXjAy2Qs5A/exec"; 

    async function generarCV() {
      const empresa = document.getElementById('empresa').value.trim();
      const oferta = document.getElementById('oferta').value.trim();

      if (!empresa || !oferta) {
        alert("Por favor llena la empresa y pega la oferta.");
        return;
      }

      // Cambiar UI a estado de carga
      document.getElementById('btnGenerar').disabled = true;
      document.getElementById('loader').style.display = 'block';
      document.getElementById('result-box').style.display = 'none';

      try {
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          body: JSON.stringify({ empresa: empresa, oferta: oferta }),
          // IMPORTANTE PARA GITHUB PAGES Y APPS SCRIPT:
          headers: { 'Content-Type': 'text/plain;charset=utf-8' } 
        });

        const data = await response.json();

        if (data.estado === "exito") {
          document.getElementById('link-doc').href = data.urlDocumento;
          document.getElementById('result-box').style.display = 'block';
        } else {
          alert("Error desde la oficina: " + data.mensaje);
        }
      } catch (error) {
        alert("Error de conexión. Revisa la consola.");
        console.error(error);
      } finally {
        document.getElementById('btnGenerar').disabled = false;
        document.getElementById('loader').style.display = 'none';
      }
    }
  </script>
</body>
</html>
